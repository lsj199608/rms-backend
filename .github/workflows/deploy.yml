name: Backend CI/CD

on:
  push:
    branches: [ "master" ] # 본인의 메인 브랜치명 확인

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean bootJar -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/rms-backend:latest


      # 실무 핵심: kube 배포 파일의 이미지 주소를 새 버전으로 수정하고 다시 커밋함!
      - name: Update kube Image Tag
        run: |
          sed -i "s|image:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/rms-backend:${{ github.sha }}|g" kube/deployment.yml
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add kube/deployment.yml
          git commit -m "Update React App to ${{ github.sha }}"
          git push