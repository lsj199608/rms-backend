server:
  port: 9090

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/rms}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgre123}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    # 운영에서는 실수로 clean이 실행되지 않도록 항상 false
    clean-disabled: true

app:
  security:
    jwt:
      # 운영은 반드시 비밀관리(예: Kubernetes Secret)로 주입
      secret: ${JWT_SECRET}
      # HTTP 환경에서는 Secure=false 필수 (HTTPS 전환 시 true로 변경)
      cookie-secure: false
      # 같은 호스트(IP)에서 프론트·백 모두 서비스 시 Lax 권장
      # (SameSite=None은 Secure=true(HTTPS) 필수이므로 HTTP에서는 사용 불가)
      cookie-same-site: Lax
      issuer: rms-backend
    cors:
      allowed-origins:
        - ${APP_SECURITY_CORS_ALLOWED_ORIGINS}
