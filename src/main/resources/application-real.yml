server:
  port: 9090

spring:
  datasource:
    url: jdbc:postgresql://리얼서버아이피:5432/rms
    username: postgres
    password: postgre123
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    # 운영에서는 실수로 clean이 실행되지 않도록 항상 false
    clean-disabled: true

app:
  security:
    jwt:
      # 운영은 반드시 비밀관리(예: Kubernetes Secret)로 주입
      secret: ${JWT_SECRET}
      cookie-secure: true
      # Next.js가 다른 서브도메인/https에서 호출 시 최소 필요
      cookie-same-site: None
      issuer: rms-backend
    cors:
      allowed-origins:
        - https://리얼프론트도메인
